name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            lib: libcraton_hsm.so
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            lib: craton_hsm.dll
          - target: x86_64-apple-darwin
            os: macos-latest
            lib: libcraton_hsm.dylib
          - target: aarch64-apple-darwin
            os: macos-latest
            lib: libcraton_hsm.dylib

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: craton_hsm-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.lib }}
            target/${{ matrix.target }}/release/craton-hsm-admin*
            target/${{ matrix.target }}/release/craton-hsm-daemon*
          retention-days: 5

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write  # Required for sigstore cosign keyless signing
      attestations: write  # Required for provenance attestation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Create tarballs and checksums
        run: |
          cd artifacts
          for dir in craton_hsm-*; do
            tar czf "${dir}.tar.gz" -C "$dir" .
            sha256sum "${dir}.tar.gz" >> checksums-sha256.txt
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v3

      - name: Sign release artifacts with cosign (keyless / Sigstore)
        run: |
          cd artifacts
          for f in *.tar.gz checksums-sha256.txt; do
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem"
          done

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums-sha256.txt
            artifacts/*.sig
            artifacts/*.pem
