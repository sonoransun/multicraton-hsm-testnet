# SunPKCS11 provider configuration for Craton HSM
#
# Usage:
#   keytool -providerClass sun.security.pkcs11.SunPKCS11 \
#           -providerArg tests/interop/pkcs11.cfg \
#           -keystore NONE -storetype PKCS11 -list
#
# This file is used by both keytool and the Java interop test script.
# The library path is overridden by the test script to point to the
# actual build output.

name = Craton HSM
library = ./target/release/libcraton_hsm.so
slot = 0
