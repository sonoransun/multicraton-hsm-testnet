{{- if ne .Values.service.type "ClusterIP" }}
{{- fail "SECURITY ERROR: Only ClusterIP is permitted. Exposing an HSM outside the cluster via NodePort/LoadBalancer is a security risk." }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "craton-hsm.fullname" . }}
  labels:
    {{- include "craton-hsm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "craton-hsm.selectorLabels" . | nindent 4 }}
